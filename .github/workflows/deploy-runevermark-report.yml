name: Deploy runEverMark Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-runevermark-report.yml
      - runEverMark/benchmark/reports/all-configs-final-r3/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-runevermark-report
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload report artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: runEverMark/benchmark/reports/all-configs-final-r3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
